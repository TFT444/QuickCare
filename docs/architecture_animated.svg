<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 1120" font-family="Segoe UI, Arial, sans-serif">
<style>
  /* ── Sequential fade-in for each layer ── */
  .l1 { animation: rise 0.6s ease 0.2s both; }
  .l2 { animation: rise 0.6s ease 0.7s both; }
  .l3 { animation: rise 0.6s ease 1.2s both; }
  .l4 { animation: rise 0.6s ease 1.7s both; }
  .l5 { animation: rise 0.6s ease 2.2s both; }
  .l6 { animation: rise 0.6s ease 2.7s both; }
  .l7 { animation: rise 0.6s ease 3.2s both; }

  /* connectors fade in between layers */
  .c1 { animation: fade 0.4s ease 0.65s both; }
  .c2 { animation: fade 0.4s ease 1.15s both; }
  .c3 { animation: fade 0.4s ease 1.65s both; }
  .c4 { animation: fade 0.4s ease 2.15s both; }
  .c5 { animation: fade 0.4s ease 2.65s both; }
  .c6 { animation: fade 0.4s ease 3.15s both; }

  /* audit labels */
  .audit { animation: fade 0.5s ease 2.1s both; }

  /* footer */
  .footer { animation: fade 0.6s ease 3.7s both; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* Flowing dashed connector lines */
  .flow {
    fill: none;
    stroke-width: 2;
    stroke-dasharray: 7 4;
    animation: dash 0.7s linear infinite;
  }
  .flow-teal   { stroke: #2dd4bf; }
  .flow-purple { stroke: #a78bfa; }
  .flow-amber  { stroke: #fbbf24; }
  .flow-red    { stroke: #f87171; }
  .flow-blue   { stroke: #60a5fa; }
  .flow-green  { stroke: #34d399; }

  @keyframes dash {
    from { stroke-dashoffset: 22; }
    to   { stroke-dashoffset: 0; }
  }

  /* shimmer on wide boxes */
  .shimmer rect { animation: shimmer 3s ease-in-out 1.5s infinite; }
  @keyframes shimmer {
    0%,100% { opacity: 0; }
    50%      { opacity: 1; }
  }
</style>

