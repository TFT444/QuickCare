<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 1080" font-family="Segoe UI, Arial, sans-serif">

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
    <marker id="arrd" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="1080" fill="#ffffff"/>

  <!-- ── TITLE ── -->
  <text x="390" y="28" text-anchor="middle" font-size="17" font-weight="600" fill="#1a1a2e">QuickCare — system flow</text>

  <!-- ── SECTION LABEL: User input layer ── -->
  <text x="390" y="55" text-anchor="middle" font-size="12" fill="#6366f1">User input layer</text>

  <!-- User input boxes (teal) -->
  <!-- Photo upload -->
  <rect x="30" y="65" width="145" height="58" rx="10" fill="#d1faf4" stroke="#4fc3b0" stroke-width="1.5"/>
  <text x="102" y="89" text-anchor="middle" font-size="12" font-weight="600" fill="#1a5f54">Photo upload</text>
  <text x="102" y="107" text-anchor="middle" font-size="10" fill="#2d7a6e">Prescription image</text>

  <!-- Voice input -->
  <rect x="195" y="65" width="145" height="58" rx="10" fill="#d1faf4" stroke="#4fc3b0" stroke-width="1.5"/>
  <text x="267" y="89" text-anchor="middle" font-size="12" font-weight="600" fill="#1a5f54">Voice input</text>
  <text x="267" y="107" text-anchor="middle" font-size="10" fill="#2d7a6e">Any language</text>

  <!-- Text input -->
  <rect x="360" y="65" width="145" height="58" rx="10" fill="#d1faf4" stroke="#4fc3b0" stroke-width="1.5"/>
  <text x="432" y="89" text-anchor="middle" font-size="12" font-weight="600" fill="#1a5f54">Text input</text>
  <text x="432" y="107" text-anchor="middle" font-size="10" fill="#2d7a6e">Type or paste</text>

  <!-- NHS record -->
  <rect x="525" y="65" width="145" height="58" rx="10" fill="#d1faf4" stroke="#4fc3b0" stroke-width="1.5"/>
  <text x="597" y="89" text-anchor="middle" font-size="12" font-weight="600" fill="#1a5f54">NHS record</text>
  <text x="597" y="107" text-anchor="middle" font-size="10" fill="#2d7a6e">Via NHS Login</text>

  <!-- Down arrows from user input -->
  <line x1="102" y1="123" x2="102" y2="155" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="267" y1="123" x2="267" y2="155" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="432" y1="123" x2="432" y2="155" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="597" y1="123" x2="597" y2="155" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── SECTION LABEL: Processing layer ── -->
  <text x="390" y="150" text-anchor="middle" font-size="12" fill="#6366f1">Processing layer</text>

  <!-- Processing boxes (lavender/purple) -->
  <!-- OCR engine -->
  <rect x="30" y="160" width="145" height="58" rx="10" fill="#ede9fe" stroke="#9b87d8" stroke-width="1.5"/>
  <text x="102" y="184" text-anchor="middle" font-size="12" font-weight="600" fill="#4c1d95">OCR engine</text>
  <text x="102" y="202" text-anchor="middle" font-size="10" fill="#5b21b6">pytesseract</text>

  <!-- STT engine -->
  <rect x="195" y="160" width="145" height="58" rx="10" fill="#ede9fe" stroke="#9b87d8" stroke-width="1.5"/>
  <text x="267" y="184" text-anchor="middle" font-size="12" font-weight="600" fill="#4c1d95">STT engine</text>
  <text x="267" y="202" text-anchor="middle" font-size="10" fill="#5b21b6">Whisper · auto lang</text>

  <!-- Lang detect -->
  <rect x="360" y="160" width="145" height="58" rx="10" fill="#ede9fe" stroke="#9b87d8" stroke-width="1.5"/>
  <text x="432" y="184" text-anchor="middle" font-size="12" font-weight="600" fill="#4c1d95">Lang detect</text>
  <text x="432" y="202" text-anchor="middle" font-size="10" fill="#5b21b6">Auto ISO 639-1</text>

  <!-- NHS Login -->
  <rect x="525" y="160" width="145" height="58" rx="10" fill="#ede9fe" stroke="#9b87d8" stroke-width="1.5"/>
  <text x="597" y="184" text-anchor="middle" font-size="12" font-weight="600" fill="#4c1d95">NHS Login</text>
  <text x="597" y="202" text-anchor="middle" font-size="10" fill="#5b21b6">OAuth 2.0</text>

  <!-- Converging arrows to AI engine -->
  <line x1="102" y1="218" x2="102" y2="248" stroke="#888" stroke-width="1.5"/>
  <line x1="267" y1="218" x2="267" y2="248" stroke="#888" stroke-width="1.5"/>
  <line x1="432" y1="218" x2="432" y2="248" stroke="#888" stroke-width="1.5"/>
  <line x1="597" y1="218" x2="597" y2="248" stroke="#888" stroke-width="1.5"/>
  <line x1="102" y1="248" x2="597" y2="248" stroke="#888" stroke-width="1.5"/>
  <line x1="349" y1="248" x2="349" y2="272" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── SECTION LABEL: AI core engine ── -->
  <text x="390" y="268" text-anchor="middle" font-size="12" fill="#6366f1">AI core engine</text>

  <!-- AI Engine box (amber/orange border) -->
  <rect x="55" y="278" width="590" height="72" rx="12" fill="#fff8ed" stroke="#f59e0b" stroke-width="2"/>
  <text x="350" y="302" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">QuickCare AI Engine — Claude API (Anthropic)</text>
  <text x="350" y="322" text-anchor="middle" font-size="10.5" fill="#b45309">Prescription explainer · Drug interaction checker · Triage guidance · Cultural context adapter</text>
  <text x="350" y="340" text-anchor="middle" font-size="10" fill="#d97706">core/ai_engine.py — claude-sonnet-4-6</text>

  <!-- Arrow to safety -->
  <line x1="350" y1="350" x2="350" y2="380" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Clinical Safety Guardrail ── -->
  <rect x="130" y="380" width="440" height="66" rx="12" fill="#fff1f2" stroke="#f87171" stroke-width="2"/>
  <text x="350" y="404" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Clinical safety guardrail</text>
  <text x="350" y="424" text-anchor="middle" font-size="10.5" fill="#b91c1c">Validates · Disclaimers · Audit log</text>
  <text x="350" y="440" text-anchor="middle" font-size="10" fill="#dc2626">core/safety.py — SHA-256 hash · no diagnostic claims</text>

  <!-- Dashed lines to audit/GDPR labels -->
  <line x1="570" y1="405" x2="650" y2="405" stroke="#aaa" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrd)"/>
  <text x="655" y="409" font-size="10" fill="#888">Audit log</text>
  <line x1="570" y1="428" x2="650" y2="428" stroke="#aaa" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrd)"/>
  <text x="655" y="432" font-size="10" fill="#888">GDPR aligned</text>

  <!-- Arrow to output features -->
  <line x1="350" y1="446" x2="350" y2="476" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── SECTION LABEL: Output features ── -->
  <text x="350" y="472" text-anchor="middle" font-size="12" fill="#6366f1">Output features</text>

  <!-- Output boxes (teal) -->
  <!-- Prescription -->
  <rect x="25" y="482" width="158" height="68" rx="10" fill="#d1faf4" stroke="#4fc3b0" stroke-width="1.5"/>
  <text x="104" y="505" text-anchor="middle" font-size="12" font-weight="600" fill="#1a5f54">Prescription</text>
  <text x="104" y="522" text-anchor="middle" font-size="10" fill="#2d7a6e">Plain language</text>
  <text x="104" y="537" text-anchor="middle" font-size="10" fill="#2d7a6e">in your language</text>

  <!-- Reminders -->
  <rect x="200" y="482" width="158" height="68" rx="10" fill="#d1faf4" stroke="#4fc3b0" stroke-width="1.5"/>
  <text x="279" y="505" text-anchor="middle" font-size="12" font-weight="600" fill="#1a5f54">Reminders</text>
  <text x="279" y="522" text-anchor="middle" font-size="10" fill="#2d7a6e">Smart push alerts</text>
  <text x="279" y="537" text-anchor="middle" font-size="10" fill="#2d7a6e">voice or text</text>

  <!-- Appointments -->
  <rect x="375" y="482" width="158" height="68" rx="10" fill="#d1faf4" stroke="#4fc3b0" stroke-width="1.5"/>
  <text x="454" y="505" text-anchor="middle" font-size="12" font-weight="600" fill="#1a5f54">Appointments</text>
  <text x="454" y="522" text-anchor="middle" font-size="10" fill="#2d7a6e">Book via voice</text>
  <text x="454" y="537" text-anchor="middle" font-size="10" fill="#2d7a6e">GP Connect FHIR</text>

  <!-- Triage guide -->
  <rect x="550" y="482" width="158" height="68" rx="10" fill="#d1faf4" stroke="#4fc3b0" stroke-width="1.5"/>
  <text x="629" y="505" text-anchor="middle" font-size="12" font-weight="600" fill="#1a5f54">Triage guide</text>
  <text x="629" y="522" text-anchor="middle" font-size="10" fill="#2d7a6e">A&amp;E vs UTC</text>
  <text x="629" y="537" text-anchor="middle" font-size="10" fill="#2d7a6e">wait times</text>

  <!-- Arrows down -->
  <line x1="104" y1="550" x2="104" y2="582" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="454" y1="550" x2="454" y2="582" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="629" y1="550" x2="629" y2="582" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── SECTION LABEL: NHS integration layer ── -->
  <text x="530" y="578" text-anchor="middle" font-size="12" fill="#6366f1">NHS integration layer</text>

  <!-- TTS engine (lavender) -->
  <rect x="25" y="585" width="158" height="58" rx="10" fill="#ede9fe" stroke="#9b87d8" stroke-width="1.5"/>
  <text x="104" y="609" text-anchor="middle" font-size="12" font-weight="600" fill="#4c1d95">TTS engine</text>
  <text x="104" y="627" text-anchor="middle" font-size="10" fill="#5b21b6">Azure · 10+ langs</text>

  <!-- GP Connect (blue) -->
  <rect x="363" y="585" width="172" height="58" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="449" y="609" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">GP Connect</text>
  <text x="449" y="627" text-anchor="middle" font-size="10" fill="#1d4ed8">FHIR R4</text>

  <!-- NHS 111 Online (blue) -->
  <rect x="550" y="585" width="172" height="58" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="636" y="609" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">NHS 111 Online</text>
  <text x="636" y="627" text-anchor="middle" font-size="10" fill="#1d4ed8">Triage API</text>

  <!-- Arrows down -->
  <line x1="104" y1="643" x2="104" y2="675" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="449" y1="643" x2="449" y2="675" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="636" y1="643" x2="636" y2="675" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Final output boxes (green) ── -->
  <!-- Voice response -->
  <rect x="25" y="678" width="158" height="52" rx="10" fill="#d1fae5" stroke="#34d399" stroke-width="1.5"/>
  <text x="104" y="708" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">Voice response</text>

  <!-- Booking confirmed -->
  <rect x="363" y="678" width="172" height="52" rx="10" fill="#d1fae5" stroke="#34d399" stroke-width="1.5"/>
  <text x="449" y="708" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">Booking confirmed</text>

  <!-- Triage outcome -->
  <rect x="550" y="678" width="172" height="52" rx="10" fill="#d1fae5" stroke="#34d399" stroke-width="1.5"/>
  <text x="636" y="708" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">Triage outcome</text>

  <!-- Converging arrows to patient box -->
  <line x1="104" y1="730" x2="104" y2="762" stroke="#888" stroke-width="1.5"/>
  <line x1="449" y1="730" x2="449" y2="762" stroke="#888" stroke-width="1.5"/>
  <line x1="636" y1="730" x2="636" y2="762" stroke="#888" stroke-width="1.5"/>
  <line x1="104" y1="762" x2="636" y2="762" stroke="#888" stroke-width="1.5"/>
  <line x1="390" y1="762" x2="390" y2="785" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Patient final box (grey) ── -->
  <rect x="130" y="788" width="520" height="62" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.8"/>
  <text x="390" y="815" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Patient — informed and supported</text>
  <text x="390" y="836" text-anchor="middle" font-size="11" fill="#475569">In their language · Safe · NHS aligned</text>

</svg>
